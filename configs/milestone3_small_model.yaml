milestone: 3
architecture:
  input_features: 3
  hidden_layers: 1
  hidden_width: 16
  activation: tanh
  output_features: 1
  headway_min_seconds: 0.5
  headway_max_seconds: 3.0
model_seeds: [1000, 1001, 1002, 1003, 1004, 1005]
horizons: [6, 10, 20, 35, 50, 80]
objective:
  default:
    progress_weight: 1.0
    safety_weight: 0.7
    jerk_weight: 5.0
    description: "Approved Milestone 3 main objective."
  aggressive_progress_comfort:
    progress_weight: 1.2
    safety_weight: 0.4
    jerk_weight: 15.0
    description: "Approved Phase E sensitivity group: higher progress and jerk weights, lower safety weight."
optimizer:
  name: Adam
  learning_rate_candidates: [0.0001, 0.0003, 0.001, 0.003, 0.01]
  calibration_updates: 100
  betas: [0.9, 0.999]
  eps: 1.0e-8
  weight_decay: 0.0
  amsgrad: false
budget:
  candidates: [200, 400, 600, 800, 1000, 1200]
  maximum_updates: 1200
  median_remaining_fraction: 0.02
  seed_remaining_fraction: 0.05
  required_seed_count: 5
  tail_updates: 100
  mean_absolute_relative_change_limit: 1.0e-4
logging:
  detail_interval: 30
gradient_field:
  checkpoint_fractions: [0.0, 0.1, 0.25, 0.5, 0.75, 1.0]
execution:
  device: cpu
  dtype: float64
  mode: scenario-batched
  warmup_repeats: 3
  timed_repeats: 10
tolerances:
  trajectory_atol: 1.0e-8
  scalar_atol: 1.0e-8
  scalar_rtol: 1.0e-7
  vector_atol: 1.0e-7
  vector_rtol: 1.0e-6
